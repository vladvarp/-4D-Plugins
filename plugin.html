<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Описание плагина для Cinema 4D">
    <!-- Заголовок обновляется через JavaScript после загрузки .md файла -->
    <title>Плагин — C4D Plugins</title>
    <link rel="stylesheet" href="web/css/style.css">
</head>
<body class="page-plugin">

    <!-- Шапка сайта -->
    <header class="site-header">
        <div class="header-inner">
            <a href="index.html" class="site-logo">
                <div class="logo-icon">C4</div>
                C4D Plugins
            </a>
            <nav class="header-nav" aria-label="Основная навигация">
                <a href="index.html">Плагины</a>
            </nav>
        </div>
    </header>

    <!-- Основной контент -->
    <main id="plugin-main">
        <div class="page-wrapper">

            <!-- Индикатор загрузки пока .md файл не загружен -->
            <div id="plugin-loading" class="loading-state" aria-live="polite">
                <div class="spinner" aria-hidden="true"></div>
                Загрузка данных плагина…
            </div>

            <!-- Hero секция плагина (заполняется из frontmatter) -->
            <section class="plugin-hero" id="plugin-hero" aria-label="Информация о плагине">

                <!-- Хлебные крошки для навигации -->
                <nav class="breadcrumb" aria-label="Навигационная цепочка">
                    <a href="index.html">Плагины</a>
                    <span class="breadcrumb-sep" aria-hidden="true">/</span>
                    <!-- Название плагина подставится через JS -->
                    <span id="plugin-name-breadcrumb">…</span>
                </nav>

                <!-- Иконка, теги и название -->
                <div class="plugin-hero-top">
                    <div class="plugin-hero-icon" aria-hidden="true">
                        <!-- Иконка из поля icon в frontmatter -->
                        <span id="plugin-icon">⬡</span>
                    </div>
                    <div class="plugin-hero-meta">
                        <div class="plugin-hero-tags" id="plugin-tags">
                            <!-- Теги из поля tags в frontmatter -->
                        </div>
                        <h1 class="plugin-hero-name" id="plugin-name">
                            Загрузка…
                        </h1>
                        <p class="plugin-hero-tagline" id="plugin-tagline"></p>
                    </div>
                </div>

                <!-- Мета-информация: версия, автор, дата, лицензия -->
                <div class="plugin-hero-info">
                    <div class="info-item">
                        <span class="info-label">Версия</span>
                        <span class="info-value" id="plugin-version">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Автор</span>
                        <span class="info-value" id="plugin-author">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Обновлено</span>
                        <span class="info-value" id="plugin-updated">—</span>
                    </div>
                    <div class="info-item">
                        <span class="info-label">Лицензия</span>
                        <span class="info-value" id="plugin-license">—</span>
                    </div>
                </div>

                <!-- Кнопки действий -->
                <div class="plugin-hero-actions">
                    <!-- Ссылка устанавливается из поля download в frontmatter -->
                    <a href="#" id="plugin-download" class="btn btn-primary">
                        ↓ Скачать плагин
                    </a>
                    <!-- Ссылка устанавливается из поля github в frontmatter -->
                    <a href="#" id="plugin-github" class="btn btn-secondary" target="_blank" rel="noopener">
                        GitHub →
                    </a>
                </div>
            </section>

            <!-- Двухколоночный макет: контент + боковая панель -->
            <div class="plugin-content-layout">

                <!-- Левая колонка: основной Markdown контент -->
                <article id="plugin-content" class="md-content" aria-label="Описание плагина">
                    <!-- Контент из .md файла вставляется сюда через renderMarkdown() -->
                </article>

                <!-- Правая колонка: боковая панель с мета-информацией -->
                <aside class="plugin-sidebar" aria-label="Информация о совместимости">

                    <!-- Блок совместимости -->
                    <div class="sidebar-block">
                        <div class="sidebar-block-title">Совместимость</div>
                        <ul class="compat-list" id="sidebar-compat">
                            <!-- Заполняется из frontmatter полей: cinema4d, os, renderer -->
                        </ul>
                    </div>

                    <!-- Блок тегов -->
                    <div class="sidebar-block">
                        <div class="sidebar-block-title">Категории</div>
                        <div class="sidebar-tags" id="sidebar-tags">
                            <!-- Теги из frontmatter -->
                        </div>
                    </div>

                </aside>
            </div>

        </div>
    </main>

    <!-- Подвал -->
    <footer class="site-footer">
        <div class="footer-inner">
            <span class="footer-text">C4D Plugins — коллекция плагинов для Cinema 4D</span>
            <nav class="footer-links" aria-label="Ссылки подвала">
                <a href="index.html">← Все плагины</a>
            </nav>
        </div>
    </footer>

    <script src="/web/js/main.js"></script>
</body>
</html>
